server:
  port: 8083
  servlet:
    context-path: /api/v1

spring:
  application:
    name: order-service
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb+srv://demo:redhat123@medpharm-cluster.j1ztlv8.mongodb.net/orders_db?appName=medpharm-cluster}
      database: orders_db
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

jwt:
  secret: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
